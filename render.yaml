# Render Blueprint — https://render.com/docs/blueprint-spec
# Render panelinde "New > Blueprint" deyip bu depoyu seçince bu dosya okunur.
services:
  - type: web
    name: artofcolour-kokpit
    runtime: node
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@10.4.1 --activate && pnpm install --frozen-lockfile && pnpm build
    # Migration'lar her deploy'da başlangıçta çalışır (tablo yoksa oluşturur, varsa dokunmaz).
    startCommand: pnpm db:migrate && pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: JWT_SECRET
        generateValue: true # Render güvenli bir değer üretir
      - key: DATABASE_URL
        sync: false # Render panelinden elle girilir (MySQL bağlantı adresi)
      - key: OWNER_EMAIL
        sync: false # Panele giriş e-postası
      - key: OWNER_PASSWORD
        sync: false # Panele giriş şifresi
      - key: OWNER_NAME
        value: Art of Colour
      - key: TRENDYOL_SELLER_ID
        sync: false # Trendyol Satıcı ID (rakam)
      - key: TRENDYOL_API_KEY
        sync: false
      - key: TRENDYOL_API_SECRET
        sync: false
      - key: HEPSIBURADA_MERCHANT_ID
        sync: false # Hepsiburada Merchant ID (opsiyonel)
      - key: HEPSIBURADA_USERNAME
        sync: false # Hepsiburada OMS kullanıcı adı (opsiyonel)
      - key: HEPSIBURADA_PASSWORD
        sync: false # Hepsiburada OMS şifresi (opsiyonel)
      - key: ANTHROPIC_API_KEY
        sync: false # AI pazarlama metinleri için (opsiyonel)
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false # WhatsApp asistanı: webhook doğrulama kelimesi (opsiyonel)
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false # WhatsApp asistanı: Meta erişim anahtarı (opsiyonel)
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false # WhatsApp asistanı: Cloud API numara kimliği (opsiyonel)
      - key: WHATSAPP_ALLOWED_NUMBERS
        sync: false # Cevap verilecek numaralar, virgülle: 90555... (opsiyonel)
      - key: PICOVOICE_ACCESS_KEY
        sync: false # Sesli uyandırma (Porcupine) AccessKey — console.picovoice.ai (opsiyonel)
      - key: PICOVOICE_KEYWORD_PATH
        sync: false # Özel "Hey Kokpit" .ppn yolu, ör. /wake/hey-kokpit.ppn (opsiyonel)
      - key: PICOVOICE_KEYWORD_LABEL
        sync: false # Özel kelime etiketi, ör. Hey Kokpit (opsiyonel)
      - key: PICOVOICE_MODEL_PATH
        sync: false # Özel Türkçe .pv model yolu, ör. /wake/porcupine_params_tr.pv (opsiyonel)
